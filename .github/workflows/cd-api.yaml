name: CD API to Render

on:
  push:
    branches: [main]
    paths:
      - "apps/api/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "package.json"

env:
  DOCKER_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  DOCKER_PASSWORD: ${{ secrets.DOCKERHUB_TOKEN }}
  RENDER_API_DEPLOY_HOOK: ${{ secrets.RENDER_API_DEPLOY_HOOK_URL }}

jobs:
  deploy-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_PASSWORD }}

      - name: Build & Push API Docker
        run: |
          docker build \
            --platform=linux/amd64 \
            -f apps/api/Dockerfile \
            -t ${{ env.DOCKER_USERNAME }}/liushushu-api:${{ github.sha }} \
            -t $DOCKER_USERNAME/liushushu-api:latest \
            .
          docker push ${{ env.DOCKER_USERNAME }}/liushushu-api:${{ github.sha }}
          docker push $DOCKER_USERNAME/liushushu-api:latest

      - name: Trigger Render API Deploy
        run: |
          curl -X POST ${{ env.RENDER_API_DEPLOY_HOOK }}
