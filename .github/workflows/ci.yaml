name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.1.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      # Install all dependencies
      - run: pnpm install --frozen-lockfile

      # Build packages/shared
      - run: pnpm --filter @liushushu/shared build

      # Generate Prisma client
      - run: pnpm --filter @liushushu/db exec prisma generate
      - run: pnpm --filter @liushushu/db build

      # # TypeScript Checks
      - run: pnpm -r typecheck

      # Lint Frontend and Backend
      - run: pnpm --filter @liushushu/api lint:fix
      - run: pnpm --filter @liushushu/web lint:fix

      # Build up Backend
      - run: pnpm --filter @liushushu/api build
