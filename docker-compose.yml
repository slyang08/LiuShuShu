version: "3.9"
services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "3001:3001"
    env_file:
      - .env
    environment:
      NODE_ENV: development
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3001/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - liushushu-net

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        API_BASE_URL: http://localhost:3000
    ports:
      - "3000:3000"
    environment:
      API_BASE_URL: http://localhost:3000
      NODE_ENV: development
    depends_on:
      api:
        condition: service_healthy
    networks:
      - liushushu-net

networks:
  liushushu-net:
    driver: bridge
